<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTracker Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Themes Definitionen */
        :root {
            --bg-color: #EDE8D0; /* Minimalistischer Beige-Ton */
            --card-bg: #ffffff;
            --primary: #2E7D32;
            --primary-light: #81C784;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --border: #D3CDBE;
            --danger: #D32F2F;
        }

        [data-theme="sand"] {
            --bg-color: #D3CDBE; /* Dunklerer Sand-Ton */
            --border: #CDC3B7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease;
        }

        /* Header Navigation */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 20px; font-weight: 700; }

        .nav-controls { display: flex; gap: 10px; align-items: center; }

        .nav-tabs { display: flex; gap: 5px; }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-muted);
        }

        .tab-btn.active { background: var(--primary); color: white; }

        .settings-trigger {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Main Container */
        .main-container { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Dashboard-Grid */
        .time-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
        }

        .filter-card.selected { border-color: var(--primary); background: #F1F8E9; }
        .filter-card h4 { margin: 0 0 5px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; }
        .filter-card .count { font-size: 28px; font-weight: 700; color: var(--primary); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .location-list { max-height: 450px; overflow-y: auto; margin: 0; padding: 0; list-style: none; }
        .location-item { padding: 12px 0; border-bottom: 1px solid #F0EFEA; font-size: 14px; }
        .location-item .time { font-weight: 600; margin-right: 10px; }
        .location-item .addr { color: var(--text-muted); }

        /* Explore Map */
        #map { height: 600px; width: 100%; border-radius: 10px; }

        /* SETTINGS OVERLAY (POP-UP) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);
        }

        .setting-row { margin-bottom: 20px; }
        .setting-row label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        .theme-btn-group { display: flex; gap: 10px; }
        .theme-btn {
            flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--card-bg); cursor: pointer; font-weight: 600;
        }
        .theme-btn.active { border-color: var(--primary); background: #F1F8E9; color: var(--primary); }

        .btn-danger {
            background: var(--danger); color: white; border: none; padding: 10px;
            border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600;
        }

        /* Status Log im Pop-up */
        #statusLog {
            background: #F8F9FA; padding: 10px; border-radius: 6px; font-size: 12px;
            margin-top: 15px; max-height: 120px; overflow-y: auto; display: none;
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body>

    <header>
        <h1>📍 GeoTracker</h1>
        <div class="nav-controls">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchView('dashboard')">Übersicht</button>
                <button class="tab-btn" onclick="switchView('explore')">Entdecken (Karte)</button>
            </div>
            <button class="settings-trigger" onclick="toggleSettings(true)">⚙️</button>
        </div>
    </header>

    <div class="main-container">
        <div id="view-dashboard" class="view-section active">
            <div class="time-filters">
                <div class="filter-card selected" id="filter-all" onclick="setTimeFilter('all')">
                    <h4>Immer</h4><div class="count" id="count-all">0</div>
                </div>
                <div class="filter-card" id="filter-today" onclick="setTimeFilter('today')">
                    <h4>Heute</h4><div class="count" id="count-today">0</div>
                </div>
                <div class="filter-card" id="filter-week" onclick="setTimeFilter('week')">
                    <h4>Diese Woche</h4><div class="count" id="count-week">0</div>
                </div>
                <div class="filter-card" id="filter-year" onclick="setTimeFilter('year')">
                    <h4>Dieses Jahr</h4><div class="count" id="count-year">0</div>
                </div>
            </div>

            <div class="card">
                <h3 id="list-title">Einträge (Immer)</h3>
                <ul class="location-list" id="logList">
                    <li class="location-item" style="color: var(--text-muted)">Keine Daten geladen. Öffne die Einstellungen, um ein CSV-Log zu importieren.</li>
                </ul>
            </div>
        </div>

        <div id="view-explore" class="view-section">
            <div class="card" style="padding: 10px;">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <button class="modal-close" id="closeModalBtn" onclick="toggleSettings(false)">×</button>
            <h3 style="margin-top: 0; margin-bottom: 20px;">Einstellungen</h3>

            <div class="setting-row">
                <label>Design-Theme</label>
                <div class="theme-btn-group">
                    <button class="theme-btn active" id="theme-beige-btn" onclick="setTheme('beige')">Zen Beige</button>
                    <button class="theme-btn" id="theme-sand-btn" onclick="setTheme('sand')">Desert Sand</button>
                </div>
            </div>

            <div class="setting-row" id="uploadRow">
                <label>Standort-Log importieren (.csv)</label>
                <input type="file" id="fileInput" accept=".csv" style="width: 100%;" />
                <div id="statusLog"></div>
            </div>

            <div class="setting-row" style="margin-bottom: 0; margin-top: 25px;">
                <label>Datenpflege</label>
                <button class="btn-danger" id="clearStorageBtn">Alle gespeicherten Orte löschen</button>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = null;
    let trackerLayer = null;
    let allPoints = [];
    let currentTimeFilter = 'all';
    let isUploading = false; // Verhindert das Schließen des Pop-ups während des Uploads

    document.addEventListener("DOMContentLoaded", () => {
        // Theme wiederherstellen falls vorhanden
        const savedTheme = localStorage.getItem("app_theme") || "beige";
        setTheme(savedTheme);
        
        loadDataFromStorage();
    });

    function toggleSettings(open) {
        if (isUploading && !open) {
            alert("Bitte warte, bis das Hinzufügen der Daten abgeschlossen ist.");
            return;
        }
        document.getElementById('settingsModal').style.display = open ? 'flex' : 'none';
    }

    function setTheme(theme) {
        if(theme === 'sand') {
            document.documentElement.setAttribute('data-theme', 'sand');
            document.getElementById('theme-sand-btn').classList.add('active');
            document.getElementById('theme-beige-btn').classList.remove('active');
        } else {
            document.documentElement.removeAttribute('data-theme');
            document.getElementById('theme-beige-btn').classList.add('active');
            document.getElementById('theme-sand-btn').classList.remove('active');
        }
        localStorage.setItem("app_theme", theme);
    }

    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

        if(viewName === 'dashboard') {
            document.getElementById('view-dashboard').classList.add('active');
            event.target.classList.add('active');
            renderDashboardList();
        } else if(viewName === 'explore') {
            document.getElementById('view-explore').classList.add('active');
            event.target.classList.add('active');
            setTimeout(() => {
                initMap();
                renderMapPoints();
            }, 50);
        }
    }

    function initMap() {
        if (map !== null) return; 
        map = L.map('map').setView([54.3233, 10.1394], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        trackerLayer = L.layerGroup().addTo(map);
    }

    function loadDataFromStorage() {
        const saved = localStorage.getItem("tracked_places");
        if (saved) { allPoints = JSON.parse(saved); }
        calculateCounters();
        renderDashboardList();
    }

    function parseGermanDate(dateStr) {
        try {
            const parts = dateStr.split(', ');
            const dParts = parts[0].split('.');
            const tParts = parts[1].split(':');
            return new Date(dParts[2], dParts[1] - 1, dParts[0], tParts[0], tParts[1]);
        } catch(e) { return new Date(0); }
    }

    function calculateCounters() {
        const now = new Date();
        let todayCount = 0, weekCount = 0, yearCount = 0;

        allPoints.forEach(p => {
            const pDate = parseGermanDate(p.timestamp);
            if(pDate.toDateString() === now.toDateString()) todayCount++;
            if(pDate >= new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000)) weekCount++;
            if(pDate.getFullYear() === now.getFullYear()) yearCount++;
        });

        document.getElementById('count-all').innerText = allPoints.length;
        document.getElementById('count-today').innerText = todayCount;
        document.getElementById('count-week').innerText = weekCount;
        document.getElementById('count-year').innerText = yearCount;
    }

    function setTimeFilter(filter) {
        currentTimeFilter = filter;
        document.querySelectorAll('.filter-card').forEach(el => el.classList.remove('selected'));
        document.getElementById(`filter-${filter}`).classList.add('selected');
        renderDashboardList();
    }

    function getFilteredPoints() {
        const now = new Date();
        return allPoints.filter(p => {
            const pDate = parseGermanDate(p.timestamp);
            if (currentTimeFilter === 'today') return pDate.toDateString() === now.toDateString();
            if (currentTimeFilter === 'week') return pDate >= new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            if (currentTimeFilter === 'year') return pDate.getFullYear() === now.getFullYear();
            return true;
        });
    }

    function renderDashboardList() {
        const listEl = document.getElementById('logList');
        const titleEl = document.getElementById('list-title');
        const filtered = getFilteredPoints();
        const filterNames = { all: 'Immer', today: 'Heute', week: 'Diese Woche', year: 'Dieses Jahr' };
        
        titleEl.innerText = `Einträge (${filterNames[currentTimeFilter]})`;
        listEl.innerHTML = '';
        
        if(filtered.length === 0) {
            listEl.innerHTML = `<li class="location-item" style="color: var(--text-muted)">Keine Einträge für diesen Zeitraum gefunden.</li>`;
            return;
        }

        filtered.forEach(p => {
            const li = document.createElement('li');
            li.className = 'location-item';
            li.innerHTML = `<span class="time">${p.timestamp}</span><span class="addr">${p.address}</span>`;
            listEl.appendChild(li);
        });
    }

    function renderMapPoints() {
        if (!trackerLayer) return;
        trackerLayer.clearLayers();
        const bounds = [];

        allPoints.forEach(point => {
            if (point.lat && point.lon) {
                const position = [point.lat, point.lon];
                bounds.push(position);

                const marker = L.circleMarker(position, { radius: 4, color: 'var(--primary)', fillColor: 'var(--primary)', fillOpacity: 1 });
                marker.bindPopup(`<strong>Zeitpunkt:</strong> ${point.timestamp}<br><strong>Ort:</strong> ${point.address}`);

                const zoneCircle = L.circle(position, {
                    radius: 1000, color: 'var(--primary)', weight: 1, fillColor: 'var(--primary-light)', fillOpacity: 0.25
                });

                zoneCircle.addTo(trackerLayer);
                marker.addTo(trackerLayer);
            }
        });

        if (bounds.length > 0) { map.fitBounds(bounds); }
    }

    // 7. INTELLIGENTER PLZ-FIRST CSV PARSER & UPLOAD
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        const statusLog = document.getElementById('statusLog');
        const closeBtn = document.getElementById('closeModalBtn');
        
        statusLog.style.display = 'block';
        isUploading = true;
        closeBtn.style.display = 'none'; // Verstecke Schließen während des Prozesses

        reader.onload = async function(e) {
            const lines = e.target.result.split('\n');
            const validEntries = [];
            statusLog.innerHTML = 'Verarbeite CSV...<br>';

            let currentTimestamp = "";
            let currentLines = [];

            // Zeilenblöcke gruppieren
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.includes(';')) {
                    if (currentTimestamp && currentLines.length > 0) {
                        validEntries.push({ timestamp: currentTimestamp, rawLines: [...currentLines] });
                    }
                    const parts = line.split(';');
                    currentTimestamp = parts[0].trim();
                    currentLines = [parts.slice(1).join(' ').trim()];
                } else {
                    if (currentTimestamp) currentLines.push(line);
                }
            }
            if (currentTimestamp && currentLines.length > 0) {
                validEntries.push({ timestamp: currentTimestamp, rawLines: currentLines });
            }

            // Intelligente Adress-Zusammensetzung (PLZ suchen)
            const parsedPlaces = [];
            validEntries.forEach(entry => {
                let plzLineIndex = -1;
                let streetLineIndex = -1;

                // RegExp für 5-stellige deutsche Postleitzahl
                const plzRegex = /\b\d{5}\b/;

                entry.rawLines.forEach((l, idx) => {
                    if (plzRegex.test(l)) {
                        plzLineIndex = idx;
                    } else if (l.toLowerCase() !== "deutschland" && streetLineIndex === -1) {
                        streetLineIndex = idx;
                    }
                });

                let cleanAddress = "";
                if (plzLineIndex !== -1 && streetLineIndex !== -1 && plzLineIndex !== streetLineIndex) {
                    // Konstruiere: "Straße Hausnummer, PLZ Ort, Deutschland"
                    cleanAddress = `${entry.rawLines[streetLineIndex]}, ${entry.rawLines[plzLineIndex]}, Deutschland`;
                } else {
                    // Fallback, falls die Struktur abweicht
                    cleanAddress = entry.rawLines.join(', ');
                }

                parsedPlaces.push({ timestamp: entry.timestamp, address: cleanAddress });
            });

            statusLog.innerHTML += `${parsedPlaces.length} Orte analysiert. Starte API-Suche...<br>`;
            
            const resolvedPoints = [];
            for (let entry of parsedPlaces) {
                statusLog.innerHTML += `Suche: ${entry.address.split(',')[0]}...<br>`;
                statusLog.scrollTop = statusLog.scrollHeight;
                
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(entry.address)}&format=json&limit=1`;
                try {
                    const res = await fetch(url, { headers: { 'User-Agent': 'GeoDashboard/1.0' } });
                    const data = await res.json();
                    if (data && data.length > 0) {
                        resolvedPoints.push({
                            lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon),
                            timestamp: entry.timestamp, address: entry.address
                        });
                    }
                    await new Promise(r => setTimeout(r, 450)); 
                } catch(err) { console.error(err); }
            }

            localStorage.setItem("tracked_places", JSON.stringify(resolvedPoints));
            statusLog.innerHTML += '<br><strong style="color:var(--primary)">✔ Hinzufügen abgeschlossen!</strong>';
            
            // Upload beendet -> Schließen wieder erlauben
            isUploading = false;
            closeBtn.style.display = 'block';
            
            loadDataFromStorage();
        };
        reader.readAsText(file);
    });

    // Daten löschen
    document.getElementById('clearStorageBtn').addEventListener('click', () => {
        if (confirm("Möchtest du wirklich alle aufgezeichneten Orte unwiderruflich löschen?")) {
            localStorage.removeItem("tracked_places");
            allPoints = [];
            if(trackerLayer) trackerLayer.clearLayers();
            document.getElementById('statusLog').style.display = 'none';
            calculateCounters();
            renderDashboardList();
            alert("Daten gelöscht.");
        }
    });
</script>
</body>
</html>
