<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker & Kartenansicht</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #EDE8D0; /* Minimalistischer Sand-Ton */
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #4a4a4a;
        }
        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .app-grid {
                grid-template-columns: 3fr 1fr;
            }
        }
        .panel {
            padding: 15px;
            border: 1px solid #D3CDBE;
            border-radius: 8px;
            background: #fdfdfb;
        }
        .settings-panel h3 {
            margin-top: 0;
            color: #4a4a4a;
        }
        #map {
            height: 550px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #D3CDBE;
        }
        .info-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        .btn-delete {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-delete:hover {
            background-color: #b71c1c;
        }
        #statusLog {
            margin-top: 10px;
            font-size: 12px;
            color: #555;
            max-height: 80px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Meine besuchten Orte</h1>
    
    <div class="app-grid">
        <div class="panel">
            <p class="info-text">Lade deine <code>Standort_Log.csv</code> hoch. Orte werden dauerhaft im Browser gespeichert.</p>
            <input type="file" id="fileInput" accept=".csv" />
            <div id="statusLog"></div>
        </div>
        
        <div class="panel settings-panel">
            <h3>Einstellungen</h3>
            <p class="info-text" id="storageInfo">Gespeicherte Orte: 0</p>
            <button class="btn-delete" id="clearStorageBtn">Daten löschen</button>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Karte initialisieren
    const map = L.map('map').setView([54.3233, 10.1394], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const trackerLayer = L.layerGroup().addTo(map);

    // Status & UI Elemente
    const statusLog = document.getElementById('statusLog');
    const storageInfo = document.getElementById('storageInfo');

    function logStatus(message) {
        statusLog.style.display = 'block';
        statusLog.innerHTML += message + '<br>';
    }

    // 2. Beim Start: Prüfen, ob bereits Daten im LocalStorage existieren
    document.addEventListener("DOMContentLoaded", () => {
        const savedData = localStorage.getItem("tracked_places");
        if (savedData) {
            const points = JSON.parse(savedData);
            updateStorageInfo(points.length);
            renderPointsOnMap(points);
        } else {
            updateStorageInfo(0);
        }
    });

    // Speicher-Anzeige aktualisieren
    function updateStorageInfo(count) {
        storageInfo.innerText = `Gespeicherte Orte: ${count}`;
    }

    // 3. Datei-Upload verarbeiten
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            statusLog.innerHTML = ''; 
            trackerLayer.clearLayers();
            
            await parseAndGeocodeCSV(text);
        };
        reader.readAsText(file);
    });

    // 4. CSV parsen und Koordinaten ermitteln
    async function parseAndGeocodeCSV(csvText) {
        const lines = csvText.split('\n');
        const validEntries = [];

        logStatus("Lese CSV-Datei ein...");

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const parts = line.split(';');
            if (parts.length >= 2) {
                const timestamp = parts[0].trim();
                const rawAddress = parts.slice(1).join(' ').replace(/\n/g, ' ').trim();
                validEntries.push({ timestamp, address: rawAddress });
            }
        }

        logStatus(`${validEntries.length} Einträge gefunden. Suche Koordinaten...`);

        const resolvedPoints = [];
        
        for (let entry of validEntries) {
            try {
                logStatus(`Suche Koordinaten für: "${entry.address.split(',')[0]}..."`);
                const coords = await fetchCoordinates(entry.address);
                
                if (coords) {
                    resolvedPoints.push({
                        lat: coords.lat,
                        lon: coords.lon,
                        timestamp: entry.timestamp,
                        address: entry.address
                    });
                }
                // Rate-Limiting für die Nominatim API
                await new Promise(resolve => setTimeout(resolve, 500));
            } catch (err) {
                console.error("Geocoding Fehler", err);
            }
        }

        // In LocalStorage abspeichern
        localStorage.setItem("tracked_places", JSON.stringify(resolvedPoints));
        updateStorageInfo(resolvedPoints.length);

        logStatus("Fertig! Daten lokal im Browser gespeichert.");
        renderPointsOnMap(resolvedPoints);
    }

    // 5. OpenStreetMap Nominatim API aufrufen
    async function fetchCoordinates(address) {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
        const response = await fetch(url, {
            headers: { 'User-Agent': 'MartenGPSVisualizer/1.0' }
        });
        const data = await response.json();
        if (data && data.length > 0) {
            return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }
        return null;
    }

    // 6. Punkte und 1-km-Kreise rendern
    function renderPointsOnMap(points) {
        trackerLayer.clearLayers();
        const bounds = [];

        points.forEach(point => {
            const position = [point.lat, point.lon];
            bounds.push(position);

            // Der klickbare Punkt
            const marker = L.circleMarker(position, {
                radius: 4,
                color: '#2e7d32',
                fillColor: '#2e7d32',
                fillOpacity: 1
            });

            marker.bindPopup(`<strong>Zeitpunkt:</strong> ${point.timestamp}<br><strong>Ort:</strong> ${point.address}`);

            // Der grüne 1-km-Kreis
            const zoneCircle = L.circle(position, {
                radius: 1000, 
                color: '#4CAF50',
                weight: 1,
                fillColor: '#81C784',
                fillOpacity: 0.25
            });

            zoneCircle.addTo(trackerLayer);
            marker.addTo(trackerLayer);
        });

        if (bounds.length > 0) {
            map.fitBounds(bounds);
        }
    }

    // 7. Daten über Einstellungen löschen
    document.getElementById('clearStorageBtn').addEventListener('click', () => {
        if (confirm("Möchtest du wirklich alle gespeicherten Orte von der Karte und aus dem Browser-Speicher löschen?")) {
            localStorage.removeItem("tracked_places");
            trackerLayer.clearLayers();
            updateStorageInfo(0);
            statusLog.innerHTML = '';
            statusLog.style.display = 'none';
            map.setView([54.3233, 10.1394], 12); // Zurück auf Standard-Ansicht
        }
    });
</script>

</body>
</html>
